<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Veja suas figurinhas repetidas e use-as para trocar com outros colecionadores.">
    <title>Minhas Repetidas — Álbum de Figurinhas Virtual</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
</head>

<body>
    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <div class="page-container">
        <!-- Header -->
        <div class="header-bar" id="header-bar">
            <div class="header-user">
                <div class="header-avatar">...</div>
                <div>
                    <div class="header-greeting">Carregando...</div>
                    <div class="header-name"></div>
                </div>
            </div>
        </div>

        <!-- Page Title -->
        <h1 class="page-title">Minhas Repetidas</h1>
        <p class="page-subtitle" id="dup-count">Use suas repetidas para fazer trocas!</p>

        <!-- Loader -->
        <div class="page-loader" id="page-loader">
            <div class="spinner"></div>
        </div>

        <!-- Content -->
        <div id="dup-content" style="display:none;">
            <div id="duplicates-list"></div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="album.html" class="nav-item">
            <span class="nav-icon">📖</span>
            <span>Álbum</span>
        </a>
        <a href="duplicates.html" class="nav-item active">
            <span class="nav-icon">🔁</span>
            <span>Repetidas</span>
        </a>
        <a href="trades.html" class="nav-item">
            <span class="nav-icon">🔄</span>
            <span>Trocas</span>
        </a>
    </nav>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/duplicates.js"></script>
    <script>
        // Renderiza o header com os dados do usuário logado
        (async () => {
            if (!currentUserProfile) {
                currentUserProfile = await getCurrentProfile();
            }
            const headerEl = document.getElementById('header-bar');
            if (headerEl && currentUserProfile) {
                const initial = (currentUserProfile.username || 'U')[0].toUpperCase();
                headerEl.innerHTML = `
          <div class="header-user">
            <div class="header-avatar">${initial}</div>
            <div>
              <div class="header-greeting">Bem-vindo de volta 👋</div>
              <div class="header-name">${currentUserProfile.username}</div>
            </div>
          </div>
          <div class="header-actions">
            <button class="btn btn-ghost btn-sm" onclick="logout()" title="Sair">🚪</button>
          </div>
        `;
            }
        })();
    </script>
</body>

</html>

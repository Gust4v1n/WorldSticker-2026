<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Central de trocas do Álbum de Figurinhas Virtual.">
  <title>Trocas — Álbum de Figurinhas Virtual</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
</head>
<body>
  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Trade Modal -->
  <div class="modal-overlay" id="trade-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">Propor Troca</h2>
        <button class="modal-close" id="modal-close-btn">✕</button>
      </div>
      <form id="trade-form">
        <div class="form-group">
          <label class="form-label" for="offer-select">Eu ofereço (Minhas Repetidas)</label>
          <select class="form-select" id="offer-select" required>
            <option value="">Carregando...</option>
          </select>
        </div>
        <div class="form-group" style="margin-bottom:24px;">
          <label class="form-label" for="wanted-select">Eu quero (Faltantes)</label>
          <select class="form-select" id="wanted-select" required>
            <option value="">Carregando...</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Enviar Proposta</button>
      </form>
    </div>
  </div>

  <div class="page-container">
    <!-- Header -->
    <div class="header-bar" style="justify-content:space-between; margin-bottom:12px;">
      <h1 class="page-title" style="font-size:1.5rem;">Central de Trocas</h1>
      <button class="btn btn-primary btn-sm" id="new-trade-btn">➕ Nova Troca</button>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="available">Disponíveis</button>
      <button class="tab" data-tab="mine">Minhas Propostas</button>
      <button class="tab" data-tab="history">Histórico</button>
    </div>

    <!-- Loader -->
    <div class="page-loader" id="page-loader">
      <div class="spinner"></div>
    </div>

    <!-- Content -->
    <div id="trades-content" style="display:none;">
      <div id="trades-list"></div>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="album.html" class="nav-item">
      <span class="nav-icon">📖</span>
      <span>Álbum</span>
    </a>
    <a href="duplicates.html" class="nav-item">
      <span class="nav-icon">🔁</span>
      <span>Repetidas</span>
    </a>
    <a href="trades.html" class="nav-item active">
      <span class="nav-icon">🔄</span>
      <span>Trocas</span>
    </a>
  </nav>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/trades.js"></script>
</body>
</html>

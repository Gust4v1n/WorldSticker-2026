<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Álbum de Figurinhas Virtual — Faça login para gerenciar sua coleção de figurinhas de jogadores.">
  <title>Login — Álbum de Figurinhas Virtual</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
</head>
<body>
  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <div class="auth-container">
    <div class="auth-logo">⚽</div>
    <h1 class="auth-brand">Álbum de Figurinhas</h1>
    <p class="auth-tagline">Colecione, troque e complete seu álbum!</p>

    <div class="glass-card auth-card">
      <h2>Entrar na conta</h2>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="email">E-mail</label>
          <input 
            class="form-input" 
            type="email" 
            id="email" 
            placeholder="seu@email.com" 
            required 
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Senha</label>
          <input 
            class="form-input" 
            type="password" 
            id="password" 
            placeholder="••••••••" 
            required 
            minlength="6"
            autocomplete="current-password"
          >
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="login-btn" style="margin-top:8px;">
          🔑 Entrar
        </button>
      </form>

      <p style="text-align:center; margin-top:20px; font-size:0.875rem; color:var(--color-text-secondary);">
        Não tem conta? 
        <a href="register.html" style="font-weight:600;">Criar conta</a>
      </p>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Redirecionar se já logado
    redirectIfLoggedIn();

    // Form de login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.textContent = 'Entrando...';

      try {
        await login(email, password);
        window.location.href = 'album.html';
      } catch (error) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast error';
        toast.innerHTML = '<span class="toast-icon">❌</span><span>' + (error.message || 'Erro ao fazer login') + '</span>';
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);

        btn.disabled = false;
        btn.textContent = '🔑 Entrar';
      }
    });
  </script>
</body>
</html>
